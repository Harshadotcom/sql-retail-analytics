services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail_analytics
    ports:
      - "5434:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d/01-migrations:ro
      - ./db/seeds:/docker-entrypoint-initdb.d/02-seeds:ro
      - .:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_analytics"]
      interval: 5s
      timeout: 3s
      retries: 10
